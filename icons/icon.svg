<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Generated by tools/icons.js; edit the scene there, not here.
       Night palette throughout, since a launcher icon cannot follow the
       OS color scheme the way the inline favicon does, and the night art
       is the better looking of the two. -->
  <clipPath id="e"><path d="M 0 52 Q 32 44 64 52 L 64 64 L 0 64 Z"/></clipPath>
  <rect fill="#15293f" width="64" height="64"/>
  <path fill="#060b12" d="M 0 0 L 64 0 L 64 18 Q 32 8 0 18 Z"/>
  <path fill="#7fa8dc" d="M 0 18 Q 32 8 64 18 L 64 22 Q 32 12 0 22 Z"/>
  <!-- lower layer: the hop pierces this one and reflects off the one above -->
  <path fill="#7fa8dc" opacity="0.55" d="M 0 37 Q 32 28 64 37 L 64 40 Q 32 31 0 40 Z"/>
  <!-- earth: two continents under the stations, open ocean between them -->
  <path fill="#3d7fb5" d="M 0 52 Q 32 44 64 52 L 64 64 L 0 64 Z"/>
  <g clip-path="url(#e)">
    <ellipse fill="#6fbe8b" cx="15" cy="54" rx="12" ry="9"/>
    <ellipse fill="#6fbe8b" cx="49" cy="54" rx="12" ry="9"/>
  </g>
  <!-- a few stars in the dark band above the ionosphere -->
  <g fill="#dce8f2">
    <circle cx="15" cy="9.5" r="1.0" opacity="0.85"/>
    <circle cx="26" cy="4.5" r="1.2"/>
    <circle cx="38" cy="7" r="0.9" opacity="0.7"/>
    <circle cx="47" cy="10.5" r="1.1" opacity="0.9"/>
  </g>
  <!-- the hop, apex kissing the underside of the curved layer -->
  <path stroke="#dce8f2" d="M 14 48 Q 32 -9 50 48" fill="none" stroke-width="5.5" stroke-linecap="round"/>
  <circle fill="#e0685c" cx="14" cy="48" r="5.5"/>
  <circle fill="#e0685c" cx="50" cy="48" r="5.5"/>
</svg>
