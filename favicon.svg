<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    .sky { fill: #fcfbf6; }
    .space { fill: #1c2434; }
    .iono { fill: #2c5697; }
    .ocean { fill: #2a6a9b; }
    .land { fill: #2e7c4f; }
    .hop { stroke: #23211c; }
    .station { fill: #be3b2e; }
    @media (prefers-color-scheme: dark) {
      .sky { fill: #15293f; }
      .space { fill: #060b12; }
      .iono { fill: #7fa8dc; }
      .ocean { fill: #3d7fb5; }
      .land { fill: #6fbe8b; }
      .hop { stroke: #dce8f2; }
      .station { fill: #e0685c; }
    }
  </style>
  <clipPath id="r"><rect width="64" height="64" rx="10"/></clipPath>
  <clipPath id="e"><path d="M 0 56 Q 32 47 64 56 L 64 64 L 0 64 Z"/></clipPath>
  <g clip-path="url(#r)">
    <rect class="sky" width="64" height="64"/>
    <rect class="space" width="64" height="16"/>
    <rect class="iono" y="16" width="64" height="4"/>
    <!-- earth: two continents under the stations, open ocean between them -->
    <path class="ocean" d="M 0 56 Q 32 47 64 56 L 64 64 L 0 64 Z"/>
    <g clip-path="url(#e)">
      <ellipse class="land" cx="13" cy="58" rx="12" ry="9"/>
      <ellipse class="land" cx="51" cy="58" rx="12" ry="9"/>
    </g>
    <!-- the hop, apex on the ionosphere layer -->
    <path class="hop" d="M 12 53 Q 32 -17 52 53" fill="none" stroke-width="5.5"
          stroke-linecap="round"/>
    <circle class="station" cx="12" cy="53" r="5.5"/>
    <circle class="station" cx="52" cy="53" r="5.5"/>
  </g>
</svg>
