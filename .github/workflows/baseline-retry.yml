name: baseline-retry
# Re-runs a failed baseline collection, at most twice (three attempts
# total), so a flaky broker or NOAA hiccup self-heals while a genuinely
# broken pipeline stops burning minutes after the cap.

on:
  workflow_run:
    workflows: [baseline]
    types: [completed]

permissions:
  actions: write

jobs:
  rerun:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Re-run the failed jobs
        run: gh run rerun ${{ github.event.workflow_run.id }} --failed --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ github.token }}
